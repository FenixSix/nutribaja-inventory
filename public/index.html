<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriBaja - Sistema de Gestión de Inventario</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #eee;
      background: #f8f9fa;
    }

    .tab-button {
      flex: 1;
      padding: 15px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 1em;
      font-weight: 500;
      color: #666;
      transition: all 0.3s ease;
      border-bottom: 3px solid transparent;
    }

    .tab-button.active {
      color: #667eea;
      border-bottom-color: #667eea;
      background: white;
    }

    .tab-button:hover {
      background: white;
    }

    .tab-content {
      display: none;
      padding: 30px;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1em;
      transition: border-color 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 500;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .product-card {
      background: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }

    .product-card:hover {
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      transform: translateY(-2px);
    }

    .product-info {
      flex: 1;
    }

    .product-name {
      font-size: 1.2em;
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }

    .product-category {
      color: #999;
      font-size: 0.9em;
      margin-bottom: 10px;
    }

    .product-details {
      display: flex;
      gap: 20px;
      font-size: 0.95em;
    }

    .product-detail {
      display: flex;
      flex-direction: column;
    }

    .product-detail label {
      margin: 0;
      color: #999;
      font-size: 0.85em;
      margin-bottom: 3px;
    }

    .product-detail value {
      font-weight: 600;
      color: #333;
    }

    .stock-low {
      color: #e74c3c;
      font-weight: bold;
    }

    .stock-ok {
      color: #27ae60;
      font-weight: bold;
    }

    .product-actions {
      display: flex;
      gap: 10px;
      margin-left: 20px;
    }

    .btn-small {
      padding: 8px 15px;
      font-size: 0.9em;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .table thead {
      background: #f8f9fa;
      border-bottom: 2px solid #ddd;
    }

    .table th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #333;
    }

    .table td {
      padding: 15px;
      border-bottom: 1px solid #eee;
    }

    .table tbody tr:hover {
      background: #f8f9fa;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 2.5em;
      font-weight: bold;
      margin: 10px 0;
    }

    .stat-label {
      font-size: 0.95em;
      opacity: 0.9;
    }

    .alert {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .product-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .product-actions {
        margin-left: 0;
        margin-top: 15px;
        width: 100%;
      }

      .product-actions button {
        flex: 1;
      }

      header h1 {
        font-size: 1.8em;
      }

      .tabs {
        flex-wrap: wrap;
      }

      .tab-button {
        flex: 0 1 50%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏋️ NutriBaja</h1>
      <p>Sistema de Gestión de Inventario y Ventas</p>
    </header>

    <div class="tabs">
      <button class="tab-button active" onclick="switchTab('dashboard')">Dashboard</button>
      <button class="tab-button" onclick="switchTab('inventory')">Inventario</button>
      <button class="tab-button" onclick="switchTab('sales')">Registrar Venta</button>
      <button class="tab-button" onclick="switchTab('history')">Historial de Ventas</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="tab-content active">
      <h2>Dashboard</h2>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Total de Productos</div>
          <div class="stat-value" id="totalProducts">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Ventas Realizadas</div>
          <div class="stat-value" id="totalSales">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Ingresos Totales</div>
          <div class="stat-value" id="totalRevenue">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Productos con Bajo Stock</div>
          <div class="stat-value" id="lowStockCount">0</div>
        </div>
      </div>
      <button onclick="refreshDashboard()">Actualizar Dashboard</button>
    </div>

    <!-- Inventario -->
    <div id="inventory" class="tab-content">
      <h2>Gestión de Inventario</h2>
      <button onclick="showAddProductForm()" style="margin-bottom: 20px;">+ Agregar Nuevo Producto</button>
      
      <div id="addProductForm" style="display: none; background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
        <h3>Nuevo Producto</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Nombre del Producto</label>
            <input type="text" id="productName" placeholder="Ej: BIOBAJA Creatina">
          </div>
          <div class="form-group">
            <label>Categoría</label>
            <input type="text" id="productCategory" placeholder="Ej: Suplementos">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Precio</label>
            <input type="number" id="productPrice" placeholder="Ej: 450" step="0.01">
          </div>
          <div class="form-group">
            <label>Stock Inicial</label>
            <input type="number" id="productStock" placeholder="Ej: 50">
          </div>
        </div>
        <button onclick="addProduct()">Guardar Producto</button>
        <button onclick="hideAddProductForm()" style="background: #999; margin-left: 10px;">Cancelar</button>
      </div>

      <div id="productsList"></div>
    </div>

    <!-- Registrar Venta -->
    <div id="sales" class="tab-content">
      <h2>Registrar Venta</h2>
      <div class="form-group">
        <label>Seleccionar Producto</label>
        <select id="saleProductSelect">
          <option value="">-- Selecciona un producto --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Cantidad Vendida</label>
        <input type="number" id="saleQuantity" placeholder="Ej: 5" min="1">
      </div>
      <div class="form-group">
        <label>Precio Total</label>
        <input type="number" id="saleTotalPrice" placeholder="Se calcula automáticamente" readonly>
      </div>
      <button onclick="registerSale()">Registrar Venta</button>
    </div>

    <!-- Historial de Ventas -->
    <div id="history" class="tab-content">
      <h2>Historial de Ventas</h2>
      <table class="table">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Monto Total</th>
            <th>Fecha</th>
          </tr>
        </thead>
        <tbody id="salesTableBody">
          <tr>
            <td colspan="4" style="text-align: center; color: #999;">Cargando...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Cambiar entre pestañas
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');

      if (tabName === 'inventory') loadProducts();
      if (tabName === 'sales') loadProductsForSale();
      if (tabName === 'history') loadSalesHistory();
      if (tabName === 'dashboard') refreshDashboard();
    }

    // Cargar productos
    async function loadProducts() {
      try {
        const response = await fetch('/api/products');
        const products = await response.json();
        
        let html = '';
        products.forEach(product => {
          const stockClass = product.stock < 10 ? 'stock-low' : 'stock-ok';
          const stockLabel = product.stock < 10 ? '⚠️ Bajo Stock' : '✓ En Stock';
          
          html += `
            <div class="product-card">
              <div class="product-info">
                <div class="product-name">${product.name}</div>
                <div class="product-category">${product.category}</div>
                <div class="product-details">
                  <div class="product-detail">
                    <label>Precio</label>
                    <value>$${product.price}</value>
                  </div>
                  <div class="product-detail">
                    <label>Stock</label>
                    <value class="${stockClass}">${product.stock} unidades</value>
                  </div>
                  <div class="product-detail">
                    <label>Estado</label>
                    <value class="${stockClass}">${stockLabel}</value>
                  </div>
                </div>
              </div>
            </div>
          `;
        });
        
        document.getElementById('productsList').innerHTML = html || '<p style="text-align: center; color: #999;">No hay productos registrados.</p>';
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('productsList').innerHTML = '<p style="color: #e74c3c;">Error al cargar productos.</p>';
      }
    }

    // Cargar productos para venta
    async function loadProductsForSale() {
      try {
        const response = await fetch('/api/products');
        const products = await response.json();
        
        let html = '<option value="">-- Selecciona un producto --</option>';
        products.forEach(product => {
          if (product.stock > 0) {
            html += `<option value="${product.id}" data-price="${product.price}" data-name="${product.name}">${product.name} - $${product.price} (Stock: ${product.stock})</option>`;
          }
        });
        
        document.getElementById('saleProductSelect').innerHTML = html;
      } catch (error) {
        console.error('Error:', error);
      }
    }

    // Calcular precio total
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('saleProductSelect').addEventListener('change', function() {
        const quantity = parseInt(document.getElementById('saleQuantity').value) || 0;
        const price = parseFloat(this.options[this.selectedIndex].dataset.price) || 0;
        document.getElementById('saleTotalPrice').value = (quantity * price).toFixed(2);
      });

      document.getElementById('saleQuantity').addEventListener('change', function() {
        const select = document.getElementById('saleProductSelect');
        const price = parseFloat(select.options[select.selectedIndex].dataset.price) || 0;
        const quantity = parseInt(this.value) || 0;
        document.getElementById('saleTotalPrice').value = (quantity * price).toFixed(2);
      });

      loadProducts();
      loadSalesHistory();
      refreshDashboard();
    });

    // Registrar venta
    async function registerSale() {
      const productId = document.getElementById('saleProductSelect').value;
      const quantity = parseInt(document.getElementById('saleQuantity').value);
      const totalPrice = parseFloat(document.getElementById('saleTotalPrice').value);

      if (!productId || !quantity || quantity <= 0) {
        alert('Por favor completa todos los campos correctamente.');
        return;
      }

      try {
        const response = await fetch('/api/sales', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ product_id: productId, quantity, total_price: totalPrice })
        });

        if (response.ok) {
          alert('¡Venta registrada exitosamente!');
          document.getElementById('saleQuantity').value = '';
          document.getElementById('saleTotalPrice').value = '';
          loadProductsForSale();
          loadSalesHistory();
          refreshDashboard();
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error al registrar la venta.');
      }
    }

    // Cargar historial de ventas
    async function loadSalesHistory() {
      try {
        const response = await fetch('/api/sales');
        const sales = await response.json();
        
        let html = '';
        sales.forEach(sale => {
          const date = new Date(sale.date).toLocaleDateString('es-ES', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
          
          html += `
            <tr>
              <td>${sale.name}</td>
              <td>${sale.quantity} unidades</td>
              <td>$${sale.total_price.toFixed(2)}</td>
              <td>${date}</td>
            </tr>
          `;
        });
        
        document.getElementById('salesTableBody').innerHTML = html || '<tr><td colspan="4" style="text-align: center; color: #999;">No hay ventas registradas.</td></tr>';
      } catch (error) {
        console.error('Error:', error);
      }
    }

    // Agregar producto
    async function addProduct() {
      const name = document.getElementById('productName').value;
      const category = document.getElementById('productCategory').value;
      const price = parseFloat(document.getElementById('productPrice').value);
      const stock = parseInt(document.getElementById('productStock').value);

      if (!name || !category || !price || !stock) {
        alert('Por favor completa todos los campos.');
        return;
      }

      try {
        const response = await fetch('/api/products', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, category, price, stock })
        });

        if (response.ok) {
          alert('¡Producto agregado exitosamente!');
          document.getElementById('productName').value = '';
          document.getElementById('productCategory').value = '';
          document.getElementById('productPrice').value = '';
          document.getElementById('productStock').value = '';
          hideAddProductForm();
          loadProducts();
          loadProductsForSale();
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error al agregar el producto.');
      }
    }

    // Mostrar/ocultar formulario de producto
    function showAddProductForm() {
      document.getElementById('addProductForm').style.display = 'block';
    }

    function hideAddProductForm() {
      document.getElementById('addProductForm').style.display = 'none';
    }

    // Actualizar dashboard
    async function refreshDashboard() {
      try {
        const productsResponse = await fetch('/api/products');
        const products = await productsResponse.json();
        
        const salesResponse = await fetch('/api/sales');
        const sales = await salesResponse.json();

        const totalProducts = products.length;
        const totalSales = sales.length;
        const totalRevenue = sales.reduce((sum, sale) => sum + sale.total_price, 0);
        const lowStockCount = products.filter(p => p.stock < 10).length;

        document.getElementById('totalProducts').textContent = totalProducts;
        document.getElementById('totalSales').textContent = totalSales;
        document.getElementById('totalRevenue').textContent = '$' + totalRevenue.toFixed(2);
        document.getElementById('lowStockCount').textContent = lowStockCount;
      } catch (error) {
        console.error('Error:', error);
      }
    }
  </script>
</body>
</html>
